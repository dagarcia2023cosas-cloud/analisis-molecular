name: analisismolecular
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=2.0
  - matplotlib>=3.7
  - seaborn>=0.12
  - scikit-learn>=1.2
  - tqdm>=4.65
  - rdkit>=2022.9
  - openbabel>=3.1
  - mdanalysis>=2.0
  - biopython>=1.81
  - prody>=2.0
  - fpocket>=3.1    # conda install -c conda-forge fpocket
  - freesasa>=2.1   # conda install -c conda-forge freesasa
  - pdb2pqr>=3.6    # conda install -c conda-forge pdb2pqr
  - apbs>=3.4       # conda install -c conda-forge apbs
  - py3Dmol>=2.0
  - nglview>=3.0
  - plotly>=5.14
  - ipywidgets>=8.0
  - jupyter>=1.0
  - pytest>=7.0
  - black>=23.0
  - ruff>=0.1
  - pip:
    - -e .
